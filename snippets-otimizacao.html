<!-- 3. ADICIONAR ANTES DO </body> -->
<!-- ============================================ -->

<!-- Performance Optimizations -->
<script src="performance-optimizations.js"></script>

<!-- Inline Critical Performance Script (opcional - para carregamento ainda mais rápido) -->
<script>
// Preload crítico inline
(function() {
    // Detectar mobile
    const isMobile = window.innerWidth < 768;
    
    // Reduzir qualidade em mobile
    if (isMobile) {
        document.documentElement.classList.add('mobile-optimized');
    }
    
    // Prevenir FOUC
    document.documentElement.style.visibility = 'visible';
    document.documentElement.style.opacity = '1';
    
    // Lazy load images
    if ('loading' in HTMLImageElement.prototype) {
        const images = document.querySelectorAll('img[data-src]');
        images.forEach(img => {
            img.src = img.dataset.src;
        });
    } else {
        // Fallback para navegadores antigos
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/lazysizes/5.3.2/lazysizes.min.js';
        document.body.appendChild(script);
    }
})();
</script>

<!-- 5. CSS INLINE CRÍTICO (adicionar no <head>) -->
<!-- ============================================ -->

<style>
/* Critical CSS - Carrega primeiro */
body {
    margin: 0;
    padding: 0;
    background: #150329;
    color: #E0EAF4;
    font-family: Inter, system-ui, sans-serif;
    overflow-x: hidden;
}

/* Prevenir FOUC */
html {
    visibility: visible !important;
    opacity: 1 !important;
}

/* Loading spinner */
.loading-spinner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 50px;
    height: 50px;
    border: 3px solid rgba(124, 58, 237, 0.3);
    border-top-color: #7C3AED;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    z-index: 9999;
}

@keyframes spin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Hero section crítico */
#hero-section {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Navbar crítico */
#navbar {
    position: fixed;
    top: 1.5rem;
    left: 0;
    right: 0;
    z-index: 1000;
    margin: 0 auto;
    width: 95%;
    max-width: 1280px;
}
</style>

            text-align: center;
            z-index: 99999;

    <div class="noscript-message">

</noscript>

<!-- 7. SERVICE WORKER (criar arquivo sw.js separado) -->
<!-- ============================================ -->

<script>
// Registrar Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('✅ Service Worker registrado'))
            .catch(err => console.log('❌ Erro no Service Worker:', err));
    });
}
</script>

<!-- 15. LOADING SKELETON (opcional) -->
<!-- ============================================ -->

<div id="loading-skeleton" class="fixed inset-0 bg-[#150329] z-[10000]">
    <div class="flex items-center justify-center h-screen">
        <div class="loading-spinner"></div>
    </div>
</div>

<script>
// Remover skeleton quando página carregar
window.addEventListener('load', () => {
    const skeleton = document.getElementById('loading-skeleton');
    if (skeleton) {
        skeleton.style.opacity = '0';
        skeleton.style.transition = 'opacity 0.3s';
        setTimeout(() => skeleton.remove(), 300);
    }
});
</script>
